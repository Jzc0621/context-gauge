name: claude_monitor
description: "A real-time desktop status monitor for Claude Code, showing live tool calls, task progress, and session stats."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter
  window_manager: 0.5.1
  screen_retriever: ^0.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
